name: R-CMD-check

on:
  push:
  pull_request:

jobs:
  R-CMD-check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package_dir:
          - packages/TruncComp
          - packages/TruncComp2

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2

      - name: Install package dependencies
        shell: Rscript {0}
        run: |
          install.packages(c("remotes", "rcmdcheck"), repos = "https://cloud.r-project.org")
          remotes::install_deps("${{ matrix.package_dir }}", dependencies = TRUE, upgrade = "never")

      - name: Check package
        shell: Rscript {0}
        run: |
          rcmdcheck::rcmdcheck(
            path = "${{ matrix.package_dir }}",
            args = c("--no-manual", "--no-build-vignettes"),
            build_args = character(),
            check_dir = file.path("check", basename("${{ matrix.package_dir }}")),
            error_on = "error"
          )
